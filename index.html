<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>タイムカード</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Zen Maru Gothic', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
            background: #fff5f8;
            min-height: 100vh;
        }

        /* ---- 背景の小花模様 ---- */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(circle, #ffb6c155 1px, transparent 1px),
                radial-gradient(circle, #ffd1dc44 1px, transparent 1px);
            background-size: 30px 30px, 50px 50px;
            background-position: 0 0, 15px 15px;
            pointer-events: none;
            z-index: 0;
        }

        header {
            background: linear-gradient(135deg, #ffb6c1 0%, #ffd1dc 50%, #ffc8d4 100%);
            color: #7c2d40;
            padding: 0 0 20px;
            text-align: center;
            border-radius: 0 0 36px 36px;
            box-shadow: 0 4px 20px rgba(255,150,170,.35);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }
        .hd-flowers {
            font-size: 14px;
            letter-spacing: 4px;
            padding: 8px 0 4px;
            opacity: 0.75;
        }
        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 4px 0 2px;
            text-shadow: 0 1px 3px rgba(255,255,255,.5);
        }
        header small {
            font-size: 13px;
            opacity: 0.8;
            display: block;
            margin-top: 4px;
            font-weight: 500;
        }

        .wrap { max-width: 480px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

        /* ---- チーム見出し ---- */
        .team-hd {
            font-size: 13px; font-weight: 700; color: #c05070;
            letter-spacing: 1px; margin: 22px 0 10px 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .team-hd::after {
            content: '';
            flex: 1; height: 1.5px;
            background: linear-gradient(to right, #ffb6c1, transparent);
            margin-left: 4px;
        }

        /* ---- 職員カード ---- */
        .emp-row {
            background: white;
            border-radius: 22px;
            padding: 15px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 12px rgba(255,150,170,.18);
            border: 2px solid #fce8ef;
            -webkit-tap-highlight-color: transparent;
            transition: all .18s;
        }
        .emp-row:active { border-color: #ff8fab; transform: scale(.97); background: #fff5f8; }
        .emp-row .name { font-size: 18px; font-weight: 700; color: #5a2030; }

        .badge { font-size: 12px; padding: 4px 13px; border-radius: 999px; font-weight: 700; }
        .b-none  { background: #f3f4f6; color: #aab0b8; }
        .b-work  { background: #d4f5e2; color: #1a6640; }
        .b-break { background: #fff2cc; color: #8a6000; }
        .b-done  { background: #eaebf8; color: #4c5ab0; }

        /* ---- 戻るボタン ---- */
        .back-btn {
            background: none; border: none; color: #e08098;
            font-size: 15px; font-weight: 700;
            cursor: pointer; padding: 8px 0 16px;
            display: flex; align-items: center; gap: 4px;
        }

        /* ---- 選択カード ---- */
        .sel-card {
            background: linear-gradient(135deg, #fff0f4, #ffe4ec);
            border-radius: 28px; padding: 24px 20px; text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 3px 15px rgba(255,150,170,.2);
            border: 2px solid #ffd1dc;
        }
        .sel-card-deco { font-size: 13px; letter-spacing: 5px; opacity: .5; margin-bottom: 6px; }
        .sel-name { font-size: 28px; font-weight: 700; color: #5a2030; margin-bottom: 6px; }
        .sel-status { color: #c06080; font-size: 14px; font-weight: 500; }

        /* ---- 打刻ボタン ---- */
        .act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .act-cell { display: flex; flex-direction: column; align-items: center; gap: 7px; }
        .act-btn {
            width: 100%; padding: 30px 8px; border: none; border-radius: 26px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            line-height: 1.6; transition: all .18s;
            font-family: 'Zen Maru Gothic', sans-serif;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .act-btn:active { transform: scale(.93); box-shadow: none; }
        .act-btn:disabled { opacity: .22; cursor: not-allowed; transform: none; box-shadow: none; }
        .act-time { font-size: 16px; font-weight: 700; color: #374151; min-height: 24px; letter-spacing: 1px; }
        .a-ci { background: linear-gradient(135deg, #c8f2d8, #a8e4bc); color: #1a5c35; border: 2px solid #9cdcb0; }
        .a-bs { background: linear-gradient(135deg, #fff0b8, #ffe08a); color: #7a5200; border: 2px solid #ffd466; }
        .a-be { background: linear-gradient(135deg, #d4e8fc, #b8d4f8); color: #1a3a70; border: 2px solid #a0c4f0; }
        .a-co { background: linear-gradient(135deg, #fce0ea, #f8bcd0); color: #8c1a35; border: 2px solid #f0a0b8; }

        /* ---- 完了画面 ---- */
        .ok-wrap { text-align: center; padding: 44px 20px 32px; }
        .ok-deco { font-size: 16px; letter-spacing: 4px; opacity: .5; margin-bottom: 8px; }
        .ok-icon { font-size: 80px; margin-bottom: 14px; }
        .ok-act  { font-size: 22px; font-weight: 700; color: #5a2030; margin-bottom: 6px; }
        .ok-who  { color: #c06080; margin-bottom: 6px; font-weight: 500; font-size: 15px; }
        .ok-time { font-size: 52px; font-weight: 700; color: #ff7096; margin-bottom: 8px; letter-spacing: 2px; }
        .ok-msg  { font-size: 15px; color: #d08098; margin-bottom: 30px; }
        .ok-btn  {
            padding: 15px 44px;
            background: linear-gradient(135deg, #ffb6c1, #ff8fab);
            color: white; border: none; border-radius: 999px;
            font-size: 17px; font-weight: 700; cursor: pointer;
            font-family: 'Zen Maru Gothic', sans-serif;
            box-shadow: 0 5px 18px rgba(255,130,160,.4);
        }

        /* ---- 管理リンク ---- */
        .admin-lnk { text-align: center; margin-top: 32px; padding-bottom: 24px; }
        .admin-lnk a { color: #e8b8c4; font-size: 12px; text-decoration: none; }

        /* ---- シフト申請ボタン ---- */
        .req-btn {
            width: 100%; margin-top: 16px; padding: 14px;
            background: white; color: #c06080;
            border: 2px solid #ffd1dc; border-radius: 22px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Zen Maru Gothic', sans-serif;
            transition: all .15s;
        }
        .req-btn:active { background: #fff5f8; }

        /* ---- 申請フォーム ---- */
        .req-form {
            background: white; border-radius: 22px; padding: 22px;
            box-shadow: 0 3px 14px rgba(255,150,170,.15);
            border: 2px solid #fce8ef;
        }
        .req-form label {
            font-size: 13px; color: #c06080; display: block;
            margin-bottom: 6px; font-weight: 700;
        }
        .req-form select,
        .req-form input[type="date"],
        .req-form input[type="time"],
        .req-form textarea {
            width: 100%; padding: 12px; border: 1.5px solid #ffd1dc; border-radius: 14px;
            font-size: 15px; margin-bottom: 16px;
            font-family: 'Zen Maru Gothic', sans-serif;
            background: #fff9fb; color: #5a2030; outline: none;
        }
        .req-form select:focus,
        .req-form input[type="date"]:focus,
        .req-form input[type="time"]:focus,
        .req-form textarea:focus { border-color: #ff8fab; }
        .req-form textarea { height: 80px; resize: none; }
        .req-submit {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #ffb6c1, #ff8fab);
            color: white; border: none; border-radius: 999px;
            font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 4px;
            font-family: 'Zen Maru Gothic', sans-serif;
            box-shadow: 0 5px 18px rgba(255,130,160,.35);
        }

        /* ---- 打刻補正フォーム ---- */
        .fix-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 4px; border-bottom: 1px solid #fce8ef;
        }
        .fix-row:last-of-type { border-bottom: none; }
        .fix-row .fix-lbl { font-size: 15px; font-weight: 700; color: #5a2030; }
        .fix-row input[type="time"] {
            width: 140px; padding: 9px 12px;
            border: 1.5px solid #ffd1dc; border-radius: 12px;
            font-size: 15px; font-family: 'Zen Maru Gothic', sans-serif;
            background: #fff9fb; color: #5a2030; outline: none; margin-bottom: 0;
        }
        .fix-row input[type="time"]:focus { border-color: #ff8fab; }

        .err { background: #fce4ec; color: #b71c1c; border-radius: 14px; padding: 14px; margin: 12px 0; font-size: 14px; }
        .loading { text-align: center; color: #e8a0b0; padding: 40px; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<header>
    <div class="hd-flowers">🌸 🌺 🌼 🌷 🌸 🌺 🌼 🌷 🌸 🌺 🌼</div>
    <h1>🕐 タイムカード</h1>
    <small id="hd-date"></small>
</header>

<div class="wrap">
    <!-- 画面1: 職員一覧 -->
    <div id="v-list">
        <div id="emp-list"><div class="loading">読み込み中… 🌸</div></div>
        <div class="admin-lnk"><a href="admin.html">管理画面</a></div>
    </div>

    <!-- 画面2: 打刻ボタン -->
    <div id="v-act" class="hidden">
        <div class="sel-card">
            <div class="sel-card-deco">🌸 🌼 🌸</div>
            <div class="sel-name" id="sel-name"></div>
            <div class="sel-status" id="sel-st"></div>
        </div>
        <div id="punch-warning" style="display:none"></div>
        <div class="act-grid">
            <div class="act-cell">
                <button class="act-btn a-ci" id="b-ci" onclick="rec('clock_in')">🟢<br>出勤</button>
                <div class="act-time" id="t-ci"></div>
            </div>
            <div class="act-cell">
                <button class="act-btn a-bs" id="b-bs" onclick="rec('break_start')">☕<br>休憩イン</button>
                <div class="act-time" id="t-bs"></div>
            </div>
            <div class="act-cell">
                <button class="act-btn a-be" id="b-be" onclick="rec('break_end')">🔵<br>休憩アウト</button>
                <div class="act-time" id="t-be"></div>
            </div>
            <div class="act-cell">
                <button class="act-btn a-co" id="b-co" onclick="rec('clock_out')">🔴<br>退勤</button>
                <div class="act-time" id="t-co"></div>
            </div>
        </div>
        <button class="req-btn" onclick="goReq()">📝 シフト申請</button>
        <button class="req-btn" style="margin-top:10px;color:#e07050;border-color:#fed7aa" onclick="goFix()">⏰ 打刻時間修正申請（押し忘れ等）</button>
        <button class="req-btn" style="margin-top:10px;color:#7c6090;border-color:#ddd1f0" onclick="goShiftView()">📅 今月のシフト表</button>
        <button class="req-btn" style="margin-top:10px;color:#b05080;border-color:#f9a8d4" onclick="goMyRecord()">📊 自分の勤務記録</button>
        <button class="req-btn" style="margin-top:10px;color:#5a8a5a;border-color:#bbe0bb" onclick="goCar()">🚗 自車使用申請</button>
        <button class="req-btn" style="margin-top:10px;color:#b45309;border-color:#fde68a" onclick="goEarly()">🌅 早出残業申請（始業前の勤務）</button>
    </div>

    <!-- 画面3: シフト変更申請 -->
    <div id="v-req" class="hidden">
        <button class="back-btn" onclick="show('v-act')">← 戻る</button>
        <div class="sel-card">
            <div class="sel-card-deco">🌸 🌼 🌸</div>
            <div class="sel-name" id="req-name"></div>
            <div class="sel-status">シフト申請</div>
        </div>
        <div class="req-form">
            <label>📅 日付</label>
            <input type="date" id="req-date">
            <label>✏️ 変更内容</label>
            <select id="req-type" onchange="toggleHours()">
                <option value="有給">有給（全日）</option>
                <option value="AM有休">AM有休（午前休）</option>
                <option value="PM有休">PM有休（午後休）</option>
                <option value="時間有給">時間有給（1時間〜）</option>
                <option value="代休">代休（休日出勤の振替）</option>
                <option value="変則">変則</option>
                <option value="中抜け">中抜け（外出・減給）</option>
                <option value="研修">研修</option>
                <option value="休">休み</option>
            </select>
            <div id="hours-row" style="display:none">
                <label>⏰ 時間数</label>
                <select id="req-hours">
                    <option value="1">1時間</option>
                    <option value="2">2時間</option>
                    <option value="3">3時間</option>
                    <option value="4">4時間</option>
                    <option value="5">5時間</option>
                    <option value="6">6時間</option>
                    <option value="7">7時間</option>
                    <option value="8">8時間</option>
                </select>
                <div id="daikyu-note" style="display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;margin-top:8px;font-size:12px;color:#1e40af;line-height:1.7"></div>
            </div>
            <div id="nakamuke-row" style="display:none">
                <label>🚶 外出した時間</label>
                <input type="time" id="nak-start">
                <label>🏃 戻ってきた時間</label>
                <input type="time" id="nak-end">
            </div>
            <label>💬 理由・コメント（任意）</label>
            <textarea id="req-reason" placeholder="例：外部研修のため、通院のため など"></textarea>
            <button class="req-submit" onclick="submitRequest()">✉️ 申請する</button>
        </div>
    </div>

    <!-- 画面: 自車使用申請 -->
    <div id="v-car" class="hidden">
        <button class="back-btn" onclick="show('v-act')">← 戻る</button>
        <div class="sel-card">
            <div class="sel-card-deco">🚗 自車使用申請</div>
            <div class="sel-name" id="car-name"></div>
            <div class="sel-status">業務で自分の車を使った記録</div>
        </div>
        <div class="req-form">
            <label>📅 日付</label>
            <input type="date" id="car-date">
            <label>🎯 目的</label>
            <select id="car-purpose">
                <option value="送迎">送迎</option>
                <option value="支援会議">支援会議</option>
                <option value="その他">その他</option>
            </select>
            <label>📏 走行距離（km）</label>
            <input type="number" id="car-distance" min="0" step="0.1" placeholder="例：12.5" inputmode="decimal">
            <label>💬 メモ（任意）</label>
            <textarea id="car-memo" placeholder="例：○○さん宅まで送迎"></textarea>
            <button class="req-submit" style="background:linear-gradient(135deg,#bbe0bb,#7fbf7f)" onclick="submitCar()">✉️ 記録する</button>
        </div>
    </div>

    <!-- 画面: 早出残業申請 -->
    <div id="v-early" class="hidden">
        <button class="back-btn" onclick="show('v-act')">← 戻る</button>
        <div class="sel-card">
            <div class="sel-card-deco">🌅 早出残業申請</div>
            <div class="sel-name" id="early-name"></div>
            <div class="sel-status">始業前に業務があったとき</div>
        </div>
        <div class="req-form">
            <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12px;color:#92400e;line-height:1.7;margin-bottom:14px">
                通常、始業時刻より前の打刻は勤務時間になりません。<br>
                <b>支援会議・同行受診など予定のある業務</b>で早く出た日は、この申請で<b>残業として計上</b>されます。
            </div>
            <label>📅 日付</label>
            <input type="date" id="early-date">
            <label>🕐 業務を始めた時刻</label>
            <input type="time" id="early-start">
            <label>🎯 用件</label>
            <select id="early-purpose">
                <option value="支援会議">支援会議</option>
                <option value="同行受診">同行受診</option>
                <option value="送迎">送迎</option>
                <option value="行事準備">行事準備</option>
                <option value="研修">研修</option>
                <option value="その他">その他</option>
            </select>
            <label>💬 内容・コメント（任意）</label>
            <textarea id="early-memo" placeholder="例：○○さんの支援会議に同席のため"></textarea>
            <button class="req-submit" style="background:linear-gradient(135deg,#fde68a,#f59e0b)" onclick="submitEarly()">✉️ 申請する</button>
        </div>
    </div>

    <!-- 画面4: 打刻補正申請 -->
    <div id="v-fix" class="hidden">
        <button class="back-btn" onclick="show('v-act')">← 戻る</button>
        <div class="sel-card">
            <div class="sel-card-deco">⏰ 打刻時間修正申請（押し忘れ等）</div>
            <div class="sel-name" id="fix-name"></div>
            <div class="sel-status">押し忘れ等の打刻を修正申請してください</div>
        </div>
        <div class="req-form">
            <label>📅 対象日</label>
            <input type="date" id="fix-date">
            <label style="margin-bottom:10px">🕐 補正する時刻（該当するものだけ入力）</label>
            <div class="fix-row">
                <span class="fix-lbl">🟢 出勤</span>
                <input type="time" id="fix-ci">
            </div>
            <div class="fix-row">
                <span class="fix-lbl">☕ 休憩イン</span>
                <input type="time" id="fix-bs">
            </div>
            <div class="fix-row">
                <span class="fix-lbl">🔵 休憩アウト</span>
                <input type="time" id="fix-be">
            </div>
            <div class="fix-row" style="margin-bottom:16px">
                <span class="fix-lbl">🔴 退勤</span>
                <input type="time" id="fix-co">
            </div>
            <label>💬 コメント（任意）</label>
            <textarea id="fix-reason" placeholder="例：会議が伸びて退勤を押し忘れました"></textarea>
            <button class="req-submit" style="background:linear-gradient(135deg,#fed7aa,#fb923c)" onclick="submitFix()">✉️ 申請する</button>
        </div>
    </div>

    <!-- 画面5: 完了 -->
    <div id="v-ok" class="hidden">
        <div class="ok-wrap">
            <div class="ok-deco">🌸 🌼 🌷 🌼 🌸</div>
            <div class="ok-icon">💮</div>
            <div class="ok-act" id="ok-act"></div>
            <div class="ok-who" id="ok-who"></div>
            <div class="ok-time" id="ok-time"></div>
            <div class="ok-msg" id="ok-msg">今日もお疲れさまです 💕</div>
            <button class="ok-btn" onclick="goList()">トップへ戻る</button>
        </div>
    </div>

    <!-- 画面6: シフト表 -->
    <!-- 個人記録画面 -->
    <div id="v-personal" class="hidden">
        <button class="back-btn" onclick="show('v-act')">← 戻る</button>
        <div style="text-align:center;margin-bottom:12px">
            <div id="personal-name" style="font-size:18px;font-weight:700;color:#c05070;margin-bottom:8px"></div>
            <div style="display:flex;justify-content:center;align-items:center;gap:20px">
                <button class="back-btn" style="font-size:20px;padding:0 10px" onclick="changePersonalMonth(-1)">◀</button>
                <span id="personal-month-label" style="font-size:16px;font-weight:700;color:#c05070"></span>
                <button class="back-btn" style="font-size:20px;padding:0 10px" onclick="changePersonalMonth(1)">▶</button>
            </div>
        </div>
        <div id="personal-tbl" style="overflow-x:auto;-webkit-overflow-scrolling:touch"></div>
    </div>

    <div id="v-shift" class="hidden">
        <button class="back-btn" onclick="show('v-act')">← 戻る</button>
        <div style="display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:10px">
            <button class="back-btn" style="font-size:20px;padding:0 8px" onclick="changeShiftViewMonth(-1)">◀</button>
            <span id="shift-view-label" style="font-size:17px;font-weight:700;color:#c05070"></span>
            <button class="back-btn" style="font-size:20px;padding:0 8px" onclick="changeShiftViewMonth(1)">▶</button>
        </div>
        <p style="font-size:12px;color:#d08098;margin-bottom:10px;text-align:center">変更・承認済みのシフトを表示しています</p>
        <div id="shift-view-tbl" style="overflow-x:auto;-webkit-overflow-scrolling:touch"></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://afqhuswlhgcqaduyppja.supabase.co'
const SUPABASE_KEY = 'sb_publishable_41dGpTLOwn_S0CuI8JxY7A_WkUuTSX9'

const { createClient } = window.supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

function todayStr() { return new Date().toLocaleDateString('sv-SE') }

async function init() {
    document.getElementById('hd-date').textContent =
        new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' })
    scheduleMidnightReset()
    try {
        const [tr, er, ar] = await Promise.all([
            db.from('teams').select('*').order('id'),
            db.from('employees').select('*,teams(name)').eq('active', true).order('sort_order'),
            db.from('attendance').select('employee_id,type').eq('date', todayStr()).order('timestamp', { ascending: false })
        ])
        teams = tr.data || []
        emps  = er.data || []
        todaySt = {}
        for (const r of ar.data || []) {
            if (!todaySt[r.employee_id]) todaySt[r.employee_id] = r.type
        }
        renderList()
    } catch(e) {
        document.getElementById('emp-list').innerHTML = `<div class="err">読み込みエラー: ${e.message}</div>`
    }
}

function renderList() {
    let h = ''
    for (const t of teams) {
        const te = emps.filter(e => e.team_id === t.id)
        if (!te.length) continue
        h += `<div class="team-hd">🌸 ${t.name}</div>`
        for (const e of te) {
            const s = todaySt[e.id]
            let cls = 'b-none', lb = '未打刻'
            if (s === 'clock_in' || s === 'break_end') { cls = 'b-work';  lb = ST[s] }
            else if (s === 'break_start')               { cls = 'b-break'; lb = ST[s] }
            else if (s === 'clock_out')                 { cls = 'b-done';  lb = ST[s] }
            h += `<div class="emp-row" onclick="selEmpFn('${e.id}')">
                    <span class="name">${e.name}</span>
                    <span class="badge ${cls}">${lb}</span>
                  </div>`
        }
    }
    if (!h) h = '<div class="loading">職員が登録されていません。<br>管理画面から追加してください。</div>'
    document.getElementById('emp-list').innerHTML = h

    const pid = new URLSearchParams(location.search).get('id')
    if (pid) selEmpFn(pid)
}

async function selEmpFn(id) {
    selEmp = emps.find(e => e.id === id)
    if (!selEmp) return
    const s = todaySt[id]
    document.getElementById('sel-name').textContent = selEmp.name
    document.getElementById('sel-st').textContent   = '現在: ' + (ST[s] || '未打刻')
    document.getElementById('b-ci').disabled = !!s
    document.getElementById('b-bs').disabled = s !== 'clock_in' && s !== 'break_end'
    document.getElementById('b-be').disabled = s !== 'break_start'
    document.getElementById('b-co').disabled = !s || s === 'clock_out'

    // 今日の打刻時刻を取得して各ボタン下に表示
    const TID = { clock_in: 't-ci', break_start: 't-bs', break_end: 't-be', clock_out: 't-co' }
    Object.values(TID).forEach(tid => { document.getElementById(tid).textContent = '' })
    const { data: recs } = await db.from('attendance')
        .select('type, timestamp').eq('employee_id', id).eq('date', todayStr())
        .order('timestamp', { ascending: true })
    for (const r of recs || []) {
        const tid = TID[r.type]
        if (tid) document.getElementById(tid).textContent =
            new Date(r.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    }

    checkMissedPunches(id)  // 過去の打刻もれをチェックして上部に警告
    show('v-act')
}

// 過去30日（今日を除く）の打刻もれを検出して赤字警告を表示
async function checkMissedPunches(id) {
    const warnEl = document.getElementById('punch-warning')
    warnEl.style.display = 'none'; warnEl.innerHTML = ''
    const DOW_J = ['日','月','火','水','木','金','土']
    const today = new Date()
    const fromD = new Date(today); fromD.setDate(today.getDate() - 30)
    const { data } = await db.from('attendance')
        .select('date,type').eq('employee_id', id)
        .gte('date', fromD.toLocaleDateString('sv-SE')).lt('date', todayStr())
        .order('date')
    if (!data || !data.length) return
    const byDate = {}
    for (const r of data) { (byDate[r.date] = byDate[r.date] || new Set()).add(r.type) }
    const issues = []
    for (const date of Object.keys(byDate).sort()) {
        const t = byDate[date]
        const hasCI = t.has('clock_in'), hasCO = t.has('clock_out')
        const hasBS = t.has('break_start'), hasBE = t.has('break_end')
        let missing = ''
        if (hasCI && !hasCO)       missing = '退勤'
        else if (!hasCI && hasCO)  missing = '出勤'
        else if (hasBS && !hasBE)  missing = '休憩アウト'
        else if (!hasBS && hasBE)  missing = '休憩イン'
        if (missing) {
            const d = new Date(date)
            issues.push(`${d.getMonth()+1}月${d.getDate()}日(${DOW_J[d.getDay()]}) ${missing}し忘れ！`)
        }
    }
    if (issues.length) {
        warnEl.style.display = 'block'
        warnEl.innerHTML = `<div style="background:#fef2f2;border:2px solid #dc2626;border-radius:12px;padding:12px 14px;margin-bottom:14px;color:#dc2626;font-weight:800;font-size:15px;line-height:1.8">
            ⚠️ 打刻もれの可能性！<br>${issues.map(i => `・${i}`).join('<br>')}
            <div style="font-size:12px;font-weight:600;color:#991b1b;margin-top:8px">確認後、⏰打刻時間修正申請をしてください。</div>
        </div>`
    }
}

async function rec(type) {

// 深夜0時に打刻時刻表示をリセット
function scheduleMidnightReset() {
    const now = new Date()
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0)
    setTimeout(() => {
        ['t-ci','t-bs','t-be','t-co'].forEach(id => {
            const el = document.getElementById(id)
            if (el) el.textContent = ''
        })
        scheduleMidnightReset()
    }, midnight - now)
}

let daikyuBalanceH = null   // 代休として取れる残り時間（休日出勤の打刻 − 申請済み）

function toggleHours() {
    const type = document.getElementById('req-type').value
    document.getElementById('hours-row').style.display    = (type === '時間有給' || type === '代休') ? 'block' : 'none'
    document.getElementById('nakamuke-row').style.display = type === '中抜け'   ? 'block' : 'none'
    const note = document.getElementById('daikyu-note')
    if (type === '代休') {
        note.style.display = 'block'
        note.textContent = '休日出勤の記録を確認中…'
        loadDaikyuBalance()
    } else {
        note.style.display = 'none'
        daikyuBalanceH = null
        fillHourOptions(8)
    }
}

// 時間数プルダウンを 1〜max時間 で作り直す
function fillHourOptions(max) {
    const sel = document.getElementById('req-hours')
    const cur = sel.value
    const n = Math.floor(max)
    sel.innerHTML = n >= 1
        ? Array.from({length: Math.min(n, 8)}, (_, i) => `<option value="${i+1}">${i+1}時間</option>`).join('')
        : '<option value="">取得できる時間がありません</option>'
    if (cur && parseInt(cur) <= n) sel.value = cur
}

// 打刻ベースで代休の残り時間を計算する（過去6か月の休日出勤 − 申請済みの代休）
async function loadDaikyuBalance() {
    const note = document.getElementById('daikyu-note')
    const fromD = new Date(); fromD.setMonth(fromD.getMonth() - 6)
    const fromS = fromD.toLocaleDateString('sv-SE')
    try {
        const [{ data: att }, { data: reqs }] = await Promise.all([
            db.from('attendance').select('*').eq('employee_id', selEmp.id).gte('date', fromS).order('timestamp'),
            db.from('shift_requests').select('date,requested_hours,status').eq('employee_id', selEmp.id)
                .gte('date', fromS).eq('requested_type', '代休').in('status', ['pending','approved'])
        ])
        const byDate = {}
        for (const r of att || []) (byDate[r.date] = byDate[r.date] || []).push(r)
        let workedH = 0
        const days = []
        for (const ds of Object.keys(byDate).sort()) {
            if (!isHolidayDay(ds)) continue                 // 土日祝の打刻だけが休日出勤
            const m = calcHolidayMins(byDate[ds])
            if (m <= 0) continue
            workedH += m / 60
            days.push(`${ds.slice(5).replace('-','/')} ${(m/60).toFixed(1)}h`)
        }
        let usedH = 0
        for (const r of reqs || []) usedH += (r.requested_hours || 0)
        daikyuBalanceH = Math.max(0, workedH - usedH)
        fillHourOptions(daikyuBalanceH)
        if (workedH === 0) {
            note.innerHTML = '<b style="color:#b91c1c">休日出勤の打刻がありません。</b><br>代休は、土日祝に出勤して打刻した分だけ申請できます。'
        } else {
            note.innerHTML = `休日出勤 <b>${workedH.toFixed(1)}時間</b>　申請済み <b>${usedH.toFixed(1)}時間</b><br>`
                + `<b style="font-size:14px;color:${daikyuBalanceH > 0 ? '#0369a1' : '#b91c1c'}">→ 取れる代休：残り ${daikyuBalanceH.toFixed(1)}時間</b><br>`
                + `<span style="font-size:11px;color:#6b7280">対象の休日出勤：${days.join('　/　')}</span>`
        }
    } catch(e) {
        daikyuBalanceH = null
        note.innerHTML = '<span style="color:#b91c1c">残り時間を取得できませんでした。管理者に確認してください。</span>'
    }
}

async function submitRequest() {
    const date  = document.getElementById('req-date').value
    const type  = document.getElementById('req-type').value
    let reason  = document.getElementById('req-reason').value
    let hours   = (type === '時間有給' || type === '代休') ? parseInt(document.getElementById('req-hours').value) : 0
    if (!date) return alert('日付を選択してください')
    if (type === '代休') {
        if (!hours) return alert('取れる代休がありません。休日出勤の打刻を確認してください。')
        if (daikyuBalanceH != null && hours > daikyuBalanceH)
            return alert(`代休は残り ${daikyuBalanceH.toFixed(1)}時間までです。\n（休日出勤した時間の範囲で申請してください）`)
    }
    if (type === '中抜け') {
        const bs = document.getElementById('nak-start').value
        const be = document.getElementById('nak-end').value
        if (!bs || !be) return alert('外出した時間と戻ってきた時間を入力してください')
        reason = JSON.stringify({ break_start: bs, break_end: be, comment: reason })
    }
    try {
        await db.from('shift_requests').insert({
            employee_id: selEmp.id, date, requested_type: type, reason,
            requested_hours: hours
        })
        document.getElementById('ok-act').textContent  = 'シフト変更申請を送りました'
        document.getElementById('ok-who').textContent  = selEmp.name + '　' + date + '　' + type
        document.getElementById('ok-time').textContent = '申請完了 ✓'
        document.getElementById('ok-msg').textContent  = '確認後に反映されます 🌸'
        show('v-ok')
    } catch(e) { alert('エラー: ' + e.message) }
}

// ---- シフト表ビュー ----
let shiftViewOffset = 0

function goShiftView() { shiftViewOffset = 0; loadShiftView(); show('v-shift') }
function changeShiftViewMonth(d) { shiftViewOffset += d; loadShiftView() }

function getShiftViewMonth() {
    const now = new Date()
    const d = new Date(now.getFullYear(), now.getMonth() + shiftViewOffset, 1)
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
}

async function loadShiftView() {
    const month = getShiftViewMonth()
    const [year, mon] = month.split('-')
    const lastDay = new Date(parseInt(year), parseInt(mon), 0).getDate()
    const from = `${month}-01`
    const to   = `${month}-${String(lastDay).padStart(2,'0')}`

    document.getElementById('shift-view-label').textContent = `${year}年${parseInt(mon)}月`
    document.getElementById('shift-view-tbl').innerHTML = '<div class="loading">読み込み中… 🌸</div>'

    // 変更・承認済みシフトを取得
    const { data: shifts } = await db.from('shifts').select('*').gte('date', from).lte('date', to)
    const shiftMap = {}
    for (const s of shifts || []) { if (s.shift_type) shiftMap[`${s.employee_id}_${s.date}`] = s.shift_type }

    const days = []
    for (let d = 1; d <= lastDay; d++) {
        const date = new Date(parseInt(year), parseInt(mon)-1, d)
        days.push({ d, dow: date.getDay(), ds: `${month}-${String(d).padStart(2,'0')}` })
    }

    const SHIFT_COLORS = {
        '日勤':'#ffffff','午前':'#fef9c3','午後':'#ede9fe','変則':'#d1fae5',
        '春夏':'#bfdbfe','有給':'#fce7f3','AM有休':'#fbcfe8','PM有休':'#fbcfe8',
        '時間有給':'#fbcfe8','研修':'#bfdbfe','休':'#e0f2fe'
    }

    let hdr = '<th style="min-width:56px;position:sticky;left:0;background:#fff0f4;z-index:2;font-size:11px;padding:4px">名前</th>'
    for (const { d, dow, ds } of days) {
        const isHol = HOLIDAYS.has(ds)
        const bg = (dow===0 || isHol) ? '#fee2e2' : dow===6 ? '#dbeafe' : '#fff0f4'
        hdr += `<th style="background:${bg};min-width:26px;text-align:center;font-size:10px;padding:2px 1px">${d}<br>${['日','月','火','水','木','金','土'][dow]}</th>`
    }

    let rows = ''
    for (const t of teams) {
        const te = emps.filter(e => e.team_id === t.id)
        if (!te.length) continue
        rows += `<tr><td colspan="${lastDay+1}" style="background:#fce8ef;font-size:11px;font-weight:700;padding:3px 6px;color:#c05070">${t.name}</td></tr>`
        for (const emp of te) {
            let cells = `<td style="position:sticky;left:0;background:white;font-size:11px;font-weight:600;padding:3px 5px;z-index:1;white-space:nowrap;border-right:1px solid #fce8ef">${emp.name}</td>`
            for (const { dow, ds } of days) {
                const key        = `${emp.id}_${ds}`
                const isWknd     = dow===0 || dow===6
                const fixedOff   = (emp.fixed_off_days || []).includes(dow)
                const isHoliday  = HOLIDAYS.has(ds)
                const defaultSt  = (isWknd || fixedOff || isHoliday) ? '休' : (emp.default_shift || '日勤')
                const st         = shiftMap[key] !== undefined ? shiftMap[key] : defaultSt
                const isOverride = shiftMap[key] !== undefined
                const bg         = SHIFT_COLORS[st] || '#fff'
                // 変更済みは太字＋枠で強調
                const style = isOverride
                    ? `background:${bg};text-align:center;font-size:9px;padding:2px 1px;border:1.5px solid #f472b6;font-weight:700`
                    : `background:${bg};text-align:center;font-size:9px;padding:2px 1px;border:1px solid #fce8ef`
                cells += `<td style="${style}">${st}</td>`
            }
            rows += `<tr>${cells}</tr>`
        }
    }

    document.getElementById('shift-view-tbl').innerHTML =
        `<table style="border-collapse:collapse;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(255,150,170,.2)">
        <thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table>`
}

// ---- 個人記録 ----
let personalEmpId = null, personalEmpName = '', personalMonthOffset = 0

function goMyRecord() {
    if (!selEmp) return
    personalEmpId = selEmp.id
    personalEmpName = selEmp.name
    personalMonthOffset = 0
    loadPersonalRecord()
    show('v-personal')
}

function goPersonalRecord(empId, empName) {
    personalEmpId = empId
    personalEmpName = empName
    personalMonthOffset = 0
    loadPersonalRecord()
    show('v-personal')
}

function changePersonalMonth(d) { personalMonthOffset += d; loadPersonalRecord() }

function getPersonalMonth() {
    const now = new Date()
    const d = new Date(now.getFullYear(), now.getMonth() + personalMonthOffset, 1)
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
}

function toHHMMFn(mins) {
    const m = Math.abs(Math.floor(mins))
    return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}`
}

// 個人別の勤務時間ルール（開始キャップ・残業起算）。川平・藤井は14:00開始、川平は17:30から残業、輪湖は9:00開始・14:00から残業
const PERSON_TIME = {
    '川平': { capH: 14, capM: 0, otH: 17, otM: 30 },
    '藤井': { capH: 14, capM: 0, otH: 18, otM: 0 },
    '輪湖': { capH: 9,  capM: 0, otH: 14, otM: 0 },
}
// 春夏勤務の個人別ルール（藤井・川平: 9:00〜16:30 ／ 名取: 9:00〜15:00）
const PERSON_TIME_HARUNATSU = {
    '藤井': { capH: 9, capM: 0, otH: 16, otM: 30 },
    '川平': { capH: 9, capM: 0, otH: 16, otM: 30 },
    '名取': { capH: 9, capM: 0, otH: 15, otM: 0 },
}
function workTimeRule(shiftType, name) {
    if (shiftType === '春夏') {
        for (const k in PERSON_TIME_HARUNATSU) if (name && name.includes(k)) return PERSON_TIME_HARUNATSU[k]
        return { capH: 8, capM: 30, otH: 16, otM: 30 }
    }
    for (const k in PERSON_TIME) if (name && name.includes(k)) return PERSON_TIME[k]
    return { capH: 9, capM: 0, otH: 18, otM: 0 }
}
// 休日出勤の実働（分）：平日の開始時刻キャップを使わず打刻どおりに計算（7時間以上は最低60分休憩）
function calcHolidayMins(records) {
    const sorted = [...records].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
    const ci = sorted.find(r => r.type === 'clock_in')
    const co = [...sorted].reverse().find(r => r.type === 'clock_out')
    if (!ci || !co) return 0
    let brk = 0, bs = null
    for (const r of sorted) {
        if (r.type === 'break_start') bs = new Date(r.timestamp)
        else if (r.type === 'break_end' && bs) { brk += (new Date(r.timestamp) - bs) / 60000; bs = null }
    }
    const elapsed = (new Date(co.timestamp) - new Date(ci.timestamp)) / 60000
    const effBrk  = elapsed >= 420 ? Math.max(60, brk) : brk
    return Math.max(0, Math.floor(elapsed - effBrk))
}

function isHolidayDay(ds, dow) {
    if (dow == null) dow = new Date(ds).getDay()
    return dow === 0 || dow === 6 || HOLIDAYS.has(ds)
}

// ===== 早出残業（9時前勤務）：承認済みならその時刻から残業として計上 =====
function earlyStartOf(req) {
    if (!req) return null
    try { const d = JSON.parse(req.reason || '{}'); return d.start || null } catch(e) { return null }
}
function applyEarlyCap(cap, earlyStart) {
    if (!earlyStart) return cap
    const e = new Date(cap)
    e.setHours(parseInt(earlyStart.slice(0,2)), parseInt(earlyStart.slice(3,5)), 0, 0)
    if (e < cap) cap.setTime(e.getTime())
    return cap
}
function calcEarlyOtFn(records, shiftType = '', name = '', earlyStart = null) {
    if (!earlyStart) return 0
    const ciRec = [...records].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
        .find(r => r.type === 'clock_in')
    if (!ciRec) return 0
    const t = new Date(ciRec.timestamp)
    const rule = workTimeRule(shiftType, name)
    const norm = new Date(t); norm.setHours(rule.capH, rule.capM, 0, 0)
    const appr = new Date(t); appr.setHours(parseInt(earlyStart.slice(0,2)), parseInt(earlyStart.slice(3,5)), 0, 0)
    const start = t > appr ? t : appr
    return start < norm ? Math.floor((norm - start) / 60000) : 0
}

function calcMinsFn(records, shiftType = '', name = '', earlyStart = null) {
    const isHarunatsu = shiftType === '春夏'
    const rule = workTimeRule(shiftType, name)
    let ci = null, bs = null, brk = 0, result = 0
    const sorted = [...records].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
    for (const r of sorted) {
        const t = new Date(r.timestamp)
        if (r.type === 'clock_in') {
            const cap = new Date(t); cap.setHours(rule.capH, rule.capM, 0, 0)
            applyEarlyCap(cap, earlyStart)
            ci = t < cap ? cap : t
        } else if (r.type === 'break_start') {
            bs = t
        } else if (r.type === 'break_end' && bs) {
            brk += (t - bs) / 60000; bs = null
        } else if (r.type === 'clock_out' && ci) {
            result = (t - ci) / 60000 - (isHarunatsu ? 0 : brk)
        }
    }
    // 春夏以外は7時間以上で最低60分の休憩を保証（春夏は休憩を引かない）
    if (!isHarunatsu) {
        const hasCO = records.some(r => r.type === 'clock_out')
        if (hasCO && ci) {
            const elapsed = result + brk
            if (elapsed >= 420 && brk < 60) result = elapsed - 60
        }
    }
    return Math.max(0, Math.floor(result))
}

function calcOvertimeFn(records, shiftType = '', name = '', earlyStart = null) {
    const early = calcEarlyOtFn(records, shiftType, name, earlyStart)
    const co = [...records].reverse().find(r => r.type === 'clock_out')
    if (!co) return early
    const coTime = new Date(co.timestamp)
    const rule = workTimeRule(shiftType, name)
    const base = new Date(coTime)
    base.setHours(rule.otH, rule.otM, 0, 0)
    return early + (coTime > base ? Math.floor((coTime - base) / 60000) : 0)
}

function calcLeaveMinsFn(req) {
    if (!req) return 0
    const t = req.requested_type, h = req.requested_hours || 0
    if (t === '有給' || t === '研修') return 480
    if (t === 'AM有休' || t === 'PM有休') return 240
    if (t === '時間有給') return h * 60
    return 0
}

function calcNakMinsFn(req) {
    if (!req) return 0
    try {
        const d = JSON.parse(req.reason || '{}')
        if (!d.break_start || !d.break_end) return 0
        const toM = s => { const [h,m] = s.split(':').map(Number); return h*60+m }
        return Math.max(0, toM(d.break_end) - toM(d.break_start))
    } catch(e) { return 0 }
}

async function loadPersonalRecord() {
    const month = getPersonalMonth()
    const [year, mon] = month.split('-')
    const lastDay = new Date(parseInt(year), parseInt(mon), 0).getDate()
    const from = `${month}-01`
    const to   = `${month}-${String(lastDay).padStart(2,'0')}`

    document.getElementById('personal-name').textContent = personalEmpName
    document.getElementById('personal-month-label').textContent = `${year}年${parseInt(mon)}月`
    document.getElementById('personal-tbl').innerHTML = '<div class="loading">読み込み中… 🌸</div>'

    const [{ data: attData }, { data: reqData }, { data: shiftData }] = await Promise.all([
        db.from('attendance').select('*').eq('employee_id', personalEmpId)
            .gte('date', from).lte('date', to).order('timestamp'),
        db.from('shift_requests').select('*').eq('employee_id', personalEmpId)
            .gte('date', from).lte('date', to).eq('status', 'approved')
            .in('requested_type', ['有給','AM有休','PM有休','時間有給','研修','中抜け','自車使用','代休','早出残業']),
        db.from('shifts').select('date, shift_type').eq('employee_id', personalEmpId)
            .gte('date', from).lte('date', to)
    ])

    const byDate = {}
    for (const r of attData || []) {
        if (!byDate[r.date]) byDate[r.date] = []
        byDate[r.date].push(r)
    }
    const leaveByDate = {}, nakByDate = {}, daikyuByDate = {}, earlyByDate = {}, carRecords = []
    for (const r of reqData || []) {
        if (r.requested_type === '中抜け') nakByDate[r.date] = r
        else if (r.requested_type === '自車使用') carRecords.push(r)
        else if (r.requested_type === '代休') daikyuByDate[r.date] = r
        else if (r.requested_type === '早出残業') earlyByDate[r.date] = earlyStartOf(r)
        else leaveByDate[r.date] = r
    }
    const shiftByDate = {}
    for (const s of shiftData || []) if (s.shift_type) shiftByDate[s.date] = s.shift_type

    const fmt = t => new Date(t).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})
    const DOW = ['日','月','火','水','木','金','土']
    let rows = '', totalMins = 0, totalOt = 0, holidayWorkTotal = 0, daikyuTotal = 0

    for (let d = 1; d <= lastDay; d++) {
        const ds = `${month}-${String(d).padStart(2,'0')}`
        const dateObj = new Date(ds)
        const dow = dateObj.getDay()
        const recs = (byDate[ds] || []).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
        const ci = recs.find(r => r.type === 'clock_in')
        const bs = recs.find(r => r.type === 'break_start')
        const be = recs.find(r => r.type === 'break_end')
        const co = [...recs].reverse().find(r => r.type === 'clock_out')
        const leave = leaveByDate[ds]
        const daikyu = daikyuByDate[ds]
        const daikyuMins = daikyu ? (daikyu.requested_hours || 0) * 60 : 0
        const leaveLabel = leave
            ? (leave.requested_type === '時間有給' ? `時間有給${leave.requested_hours}h` : leave.requested_type)
            : (daikyu ? `代休${daikyu.requested_hours}h` : '')
        const leaveMins = calcLeaveMinsFn(leave)
        const nakMins   = calcNakMinsFn(nakByDate[ds])
        const shiftType = shiftByDate[ds] || ''
        const early     = earlyByDate[ds] || null
        const holidayWork = isHolidayDay(ds, dow) && !!ci
        // 休日出勤は平日の開始時刻キャップを使わず打刻どおりに計算する
        const worked    = holidayWork ? calcHolidayMins(recs) : calcMinsFn(recs, shiftType, personalEmpName, early)
        const fullDayLeave = leave && ['有給','研修'].includes(leave.requested_type)
        // 早出残業分は残業なので、有休の上限（実働＋有休≦8時間）の計算からは除く
        const earlyOtMins  = calcEarlyOtFn(recs, shiftType, personalEmpName, early)
        const effLeaveMins = (ci && fullDayLeave) ? 0 : Math.min(leaveMins, Math.max(0, 480 - (worked - earlyOtMins)))
        // 休日出勤：実働は全て残業扱い（通常0）。代休は通常勤務に加算
        const dayTotal  = (holidayWork ? 0 : worked + effLeaveMins - nakMins) + daikyuMins
        const ot        = holidayWork ? worked : calcOvertimeFn(recs, shiftType, personalEmpName, early)
        if (holidayWork) holidayWorkTotal += worked; else totalOt += ot
        daikyuTotal += daikyuMins
        if (!ci && !co && !leaveLabel && !daikyu) continue
        totalMins += dayTotal
        const weekend = dow === 0 || dow === 6
        const color = (weekend && !holidayWork) ? '#9ca3af' : '#374151'
        const badgeColor = holidayWork ? '#1e3a8a' : daikyu ? '#0369a1' : '#9d174d'
        const badgeBg    = holidayWork ? '#dbeafe' : daikyu ? '#e0f2fe' : '#fbcfe8'
        const badgeText  = holidayWork ? '休日出勤' : leaveLabel
        const leaveBadge = (badgeText
            ? `<span style="background:${badgeBg};color:${badgeColor};font-size:9px;padding:1px 4px;border-radius:999px;font-weight:600;white-space:nowrap">${badgeText}</span>`
            : '')
            + (early ? `<span style="background:#fef3c7;color:#92400e;font-size:9px;padding:1px 4px;border-radius:999px;font-weight:700;white-space:nowrap">🌅早出</span>` : '')
        rows += `<tr style="border-bottom:1px solid #fce8ef;color:${color}">
            <td style="padding:5px 6px;font-size:12px;white-space:nowrap;font-weight:600">${parseInt(mon)}/${d}（${DOW[dow]}）</td>
            <td style="padding:5px 3px;font-size:12px;text-align:center">${ci ? fmt(ci.timestamp) : (leaveBadge || '-')}</td>
            <td style="padding:5px 3px;font-size:12px;text-align:center">${bs ? fmt(bs.timestamp) : '-'}</td>
            <td style="padding:5px 3px;font-size:12px;text-align:center">${be ? fmt(be.timestamp) : '-'}</td>
            <td style="padding:5px 3px;font-size:12px;text-align:center">${co ? fmt(co.timestamp) : '-'}</td>
            <td style="padding:5px 3px;font-size:13px;text-align:center;font-weight:700;color:#c05070">${dayTotal > 0 ? toHHMMFn(dayTotal) : '-'}</td>
            <td style="padding:5px 3px;font-size:12px;text-align:center;font-weight:700;color:#dc2626">${ot > 0 ? toHHMMFn(ot) : '-'}</td>
        </tr>`
    }

    if (!rows) {
        const carOnly = buildCarTable(carRecords, parseInt(mon))
        document.getElementById('personal-tbl').innerHTML = carOnly ||
            '<div style="text-align:center;color:#9ca3af;padding:40px 20px">この月の記録はありません</div>'
        return
    }
    totalOt += Math.max(0, holidayWorkTotal - daikyuTotal)  // 休日出勤の残業＝休日出勤−代休
    if (holidayWorkTotal > 0 || daikyuTotal > 0)
        rows += `<tr><td colspan="7" style="font-size:10px;color:#0369a1;background:#f0f9ff;padding:4px 8px">休日出勤 計${toHHMMFn(holidayWorkTotal)} ／ 代休 計${toHHMMFn(daikyuTotal)}（代休残高 ${toHHMMFn(Math.max(0,holidayWorkTotal-daikyuTotal))}）</td></tr>`
    rows += `<tr style="background:#fff0f4;font-weight:700;border-top:2px solid #f9a8d4">
        <td style="padding:6px 6px;font-size:12px" colspan="5">合計</td>
        <td style="padding:6px 3px;font-size:13px;text-align:center;color:#c05070">${toHHMMFn(totalMins)}</td>
        <td style="padding:6px 3px;font-size:12px;text-align:center;color:#dc2626">${totalOt > 0 ? toHHMMFn(totalOt) : '-'}</td>
    </tr>`

    const workTable = `
        <table style="width:100%;border-collapse:collapse;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(255,150,170,.2);font-family:'Hiragino Sans','Yu Gothic UI',sans-serif">
            <thead><tr style="background:#fff0f4">
                <th style="padding:6px 6px;font-size:10px;color:#c05070;text-align:left">日付</th>
                <th style="padding:6px 3px;font-size:10px;color:#c05070;text-align:center">出勤</th>
                <th style="padding:6px 3px;font-size:10px;color:#c05070;text-align:center">休憩イン</th>
                <th style="padding:6px 3px;font-size:10px;color:#c05070;text-align:center">休憩アウト</th>
                <th style="padding:6px 3px;font-size:10px;color:#c05070;text-align:center">退勤</th>
                <th style="padding:6px 3px;font-size:10px;color:#c05070;text-align:center">勤務</th>
                <th style="padding:6px 3px;font-size:10px;color:#dc2626;text-align:center">残業</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>`

    document.getElementById('personal-tbl').innerHTML = workTable + buildCarTable(carRecords, parseInt(mon))
}

// 自車使用記録テーブルを生成
function buildCarTable(carRecords, monNum) {
    if (!carRecords || carRecords.length === 0) return ''
    const DOW = ['日','月','火','水','木','金','土']
    const parsed = carRecords.map(r => {
        let purpose = '', distance = 0, comment = ''
        try {
            const d = JSON.parse(r.reason || '{}')
            purpose  = d.purpose  || ''
            distance = parseFloat(d.distance) || 0
            comment  = d.comment  || ''
        } catch(e) {}
        return { date: r.date, purpose, distance, comment }
    }).sort((a,b) => a.date.localeCompare(b.date))

    let totalKm = 0
    const byPurpose = {}
    let carRows = ''
    for (const c of parsed) {
        totalKm += c.distance
        byPurpose[c.purpose] = (byPurpose[c.purpose] || 0) + c.distance
        const dateObj = new Date(c.date)
        const d = dateObj.getDate()
        const dow = dateObj.getDay()
        carRows += `<tr style="border-bottom:1px solid #e0f0e0">
            <td style="padding:5px 6px;font-size:12px;white-space:nowrap;font-weight:600;color:#3a6a3a">${monNum}/${d}（${DOW[dow]}）</td>
            <td style="padding:5px 6px;font-size:12px;text-align:center">${c.purpose}</td>
            <td style="padding:5px 6px;font-size:13px;text-align:center;font-weight:700;color:#2e7d32">${c.distance}km</td>
            <td style="padding:5px 6px;font-size:11px;color:#6b7280;word-break:break-all">${c.comment || ''}</td>
        </tr>`
    }
    const purposeSummary = Object.entries(byPurpose)
        .map(([p, km]) => `${p} ${Math.round(km*10)/10}km`).join('　/　')
    carRows += `<tr style="background:#eef7ee;font-weight:700;border-top:2px solid #a8d8a8">
        <td style="padding:6px 6px;font-size:12px" colspan="2">合計</td>
        <td style="padding:6px 6px;font-size:13px;text-align:center;color:#2e7d32">${Math.round(totalKm*10)/10}km</td>
        <td style="padding:6px 6px;font-size:10px;color:#3a6a3a">${purposeSummary}</td>
    </tr>`

    return `
        <div style="margin-top:24px;margin-bottom:8px;font-size:14px;font-weight:700;color:#3a6a3a">🚗 自車使用記録</div>
        <table style="width:100%;border-collapse:collapse;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(120,190,120,.2);font-family:'Hiragino Sans','Yu Gothic UI',sans-serif">
            <thead><tr style="background:#eef7ee">
                <th style="padding:6px 6px;font-size:10px;color:#3a6a3a;text-align:left">日付</th>
                <th style="padding:6px 6px;font-size:10px;color:#3a6a3a;text-align:center">目的</th>
                <th style="padding:6px 6px;font-size:10px;color:#3a6a3a;text-align:center">距離</th>
                <th style="padding:6px 6px;font-size:10px;color:#3a6a3a;text-align:left">メモ</th>
            </tr></thead>
            <tbody>${carRows}</tbody>
        </table>`
}

init()

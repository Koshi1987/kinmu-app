<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif; background: #f5f7fa; }

        /* パスワード画面 */
        .pw-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .pw-card { background: white; border-radius: 20px; padding: 40px 32px; box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 100%; max-width: 320px; text-align: center; }
        .pw-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .pw-sub { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .pw-input { width: 100%; padding: 14px; font-size: 24px; border: 2px solid #e5e7eb; border-radius: 12px; text-align: center; letter-spacing: 8px; margin-bottom: 16px; outline: none; }
        .pw-input:focus { border-color: #3b82f6; }
        .pw-btn { width: 100%; padding: 14px; background: #1d4ed8; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .pw-err { color: #ef4444; font-size: 14px; margin-top: 10px; }

        /* ヘッダー */
        header { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 18px; font-weight: 700; }
        .hd-btn { background: rgba(255,255,255,.2); border: none; color: white; padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-left: 6px; }

        /* タブ */
        .tabs { background: white; border-bottom: 1px solid #e5e7eb; display: flex; overflow-x: auto; }
        .tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: #6b7280; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: color .15s; }
        .tab.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }

        .content { max-width: 960px; margin: 0 auto; padding: 20px; }

        /* テーブル */
        .tbl-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
        th { background: #f8fafc; font-size: 12px; font-weight: 600; color: #6b7280; padding: 11px 14px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        td { padding: 11px 14px; font-size: 14px; border-bottom: 1px solid #f3f4f6; }
        tr:last-child td { border-bottom: none; }
        .total-row td { font-weight: 700; background: #f8fafc; }
        .team-row td { background: #f1f5f9; font-weight: 700; font-size: 13px; color: #374151; }

        .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 500; display: inline-block; }
        .b-work  { background: #dcfce7; color: #15803d; }
        .b-break { background: #fef9c3; color: #92400e; }
        .b-done  { background: #f1f5f9; color: #475569; }
        .b-none  { background: #f3f4f6; color: #9ca3af; }

        /* セクションヘッダー */
        .sec-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .sec-title { font-size: 18px; font-weight: 700; }

        /* フォーム部品 */
        .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        input[type="date"], input[type="text"], input[type="time"], select {
            padding: 9px 12px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; background: white; outline: none;
        }
        input[type="date"]:focus, input[type="text"]:focus, input[type="time"]:focus, select:focus { border-color: #3b82f6; }
        .btn { padding: 9px 18px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #1d4ed8; color: white; }
        .btn-danger  { background: #ef4444; color: white; }
        .btn-ghost   { background: #f3f4f6; color: #374151; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* 職員カード */
        .emp-card { background: white; border-radius: 12px; padding: 14px 18px; box-shadow: 0 1px 6px rgba(0,0,0,.07); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .emp-info .name { font-size: 16px; font-weight: 600; }
        .emp-info .team-lbl { font-size: 12px; color: #6b7280; margin-top: 2px; }
        .emp-actions { display: flex; gap: 8px; }

        /* 追加フォーム */
        .add-form { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 20px; }
        .add-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }

        /* QRコード */
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .qr-card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
        .qr-card .name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .qr-card .team-lbl { font-size: 12px; color: #6b7280; margin-bottom: 12px; }
        .qr-card img { width: 150px; height: 150px; }

        /* シフト */
        .shift-input { width: 82px; padding: 4px 6px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px; }
        .week-nav { display: flex; align-items: center; gap: 10px; }
        .week-nav button { background: #f3f4f6; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .week-label { font-size: 14px; font-weight: 500; }

        /* メッセージ */
        .msg { padding: 12px 16px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; }
        .msg-ok  { background: #dcfce7; color: #15803d; }
        .msg-err { background: #fef2f2; color: #b91c1c; }

        .loading { text-align: center; color: #9ca3af; padding: 40px; }
        .print-note { display: none; font-size: 12px; color: #666; text-align: right; margin-bottom: 8px; }

        /* サブタブ */
        .sub-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; }
        .sub-tab { padding: 10px 20px; background: none; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px; font-size: 14px; font-weight: 500; color: #6b7280; cursor: pointer; transition: color .15s; }
        .sub-tab.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
        .sub-tab:hover:not(.active) { color: #374151; }

        @media print {
            @page { size: A4 portrait; margin: 10mm; }  /* デフォルト縦（シフト表はJSで横に切り替え） */
            header, .tabs, .sub-tabs, .sec-hd .btn, .sec-hd select, .form-row, .hd-btn,
            #shift-legend, .sec-hd .week-nav button { display: none !important; }
            .print-note { display: block !important; }
            body { background: white; }
            .content { padding: 0 !important; }
            /* 月間記録・週間集計：縦A4にフィット */
            #monthly-tbl table, #weekly-tbl table { width: 100%; font-size: 10pt; border-collapse: collapse; }
            #monthly-tbl th, #monthly-tbl td,
            #weekly-tbl th, #weekly-tbl td { padding: 4px 8px; border-bottom: 1px solid #e5e7eb; }
            /* スクロール解除：スクロール位置に関係なく全列を表示 */
            #shift-tbl-monthly { overflow: visible !important; }
            #shift-tbl-monthly div {
                overflow-x: visible !important;
                overflow-y: visible !important;
                max-height: none !important;
            }
            /* テーブルをA4横に100%フィット */
            #shift-tbl-monthly table {
                font-size: 7.5pt !important;
                width: 100% !important;
                table-layout: fixed !important;
            }
            /* セルの最小幅をリセットして均等割り */
            #shift-tbl-monthly th,
            #shift-tbl-monthly td {
                padding: 1px 2px !important;
                font-size: 7.5pt !important;
                min-width: 0 !important;
                overflow: hidden !important;
            }
            /* 名前列：固定幅・sticky解除 */
            #shift-tbl-monthly th:first-child,
            #shift-tbl-monthly td:first-child {
                width: 13% !important;
                position: static !important;
            }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pw-screen" class="pw-screen">
    <div class="pw-card">
        <div class="pw-title">🔐 管理画面</div>
        <div class="pw-sub">パスワードを入力してください</div>
        <input type="password" class="pw-input" id="pw-input" placeholder="••••"
               onkeyup="if(event.key==='Enter') checkPw()">
        <button class="pw-btn" onclick="checkPw()">ログイン</button>
        <div class="pw-err hidden" id="pw-err">パスワードが違います</div>
    </div>
</div>

<!-- メインアプリ -->
<div id="main-app" class="hidden">
    <header>
        <h1>⚙️ 管理画面</h1>
        <div>
            <button class="hd-btn" onclick="window.print()">🖨 印刷</button>
            <button class="hd-btn" onclick="location.href='index.html'">打刻ページへ</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active"  onclick="switchTab('today')">📊 今日の状況</div>
        <div class="tab"         onclick="switchTab('records')">📅 勤務記録</div>
        <div class="tab"         onclick="switchTab('shifts')">シフト表</div>
        <div class="tab"         onclick="switchTab('requests')" id="tab-btn-requests">📬 申請確認</div>
        <div class="tab"         onclick="switchTab('employees')">👥 職員管理</div>
        <div class="tab"         onclick="switchTab('qr')">📱 QRコード</div>
    </div>

    <div class="content">
        <!-- 今日の状況 -->
        <div id="tab-today">
            <div class="sec-hd">
                <span class="sec-title" id="today-title">今日の出勤状況</span>
                <button class="btn btn-ghost" onclick="loadToday()">🔄 更新</button>
            </div>
            <div class="print-note" id="pn-today"></div>
            <div class="tbl-wrap" id="today-tbl"></div>
        </div>

        <!-- 勤務記録（サブタブ：日別・週間・月間） -->
        <div id="tab-records" class="hidden">
            <div class="sub-tabs">
                <button class="sub-tab active" onclick="switchRecordTab('daily')">📅 日別記録</button>
                <button class="sub-tab"        onclick="switchRecordTab('weekly')">📈 週間集計</button>
                <button class="sub-tab"        onclick="switchRecordTab('monthly')">👤 月間記録</button>
            </div>
            <!-- 日別記録 -->
            <div id="sub-daily">
                <div class="sec-hd"><span class="sec-title">勤務記録</span></div>
                <div class="form-row">
                    <input type="date" id="rec-date">
                    <button class="btn btn-primary" onclick="loadRecords()">表示</button>
                </div>
                <div id="rec-tbl"></div>
            </div>
            <!-- 週間集計 -->
            <div id="sub-weekly" class="hidden">
                <div class="sec-hd">
                    <span class="sec-title">週間集計</span>
                    <div class="week-nav">
                        <button onclick="changeWeek(-1)">◀</button>
                        <span class="week-label" id="week-label"></span>
                        <button onclick="changeWeek(1)">▶</button>
                    </div>
                </div>
                <div class="print-note" id="pn-weekly"></div>
                <div class="tbl-wrap" id="weekly-tbl"></div>
            </div>
            <!-- 月間記録 -->
            <div id="sub-monthly" class="hidden">
                <div class="sec-hd"><span class="sec-title">月間個人記録</span></div>
                <div class="form-row">
                    <select id="monthly-emp"></select>
                    <input type="month" id="monthly-month">
                    <button class="btn btn-primary" onclick="loadMonthly()">表示</button>
                </div>
                <div class="print-note" id="pn-monthly-emp"></div>
                <div class="tbl-wrap" id="monthly-tbl"></div>
            </div>
        </div>

        <!-- シフト表 -->
        <div id="tab-shifts" class="hidden">
            <div class="sec-hd">
                <span class="sec-title">シフト表</span>
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    <div class="week-nav">
                        <button onclick="changeShiftMonth(-1)">◀</button>
                        <span class="week-label" id="shift-month-label"></span>
                        <button onclick="changeShiftMonth(1)">▶</button>
                    </div>
                    <select id="shift-team-filter" onchange="loadShiftsMonthly()">
                        <option value="all">全員</option>
                    </select>
                </div>
            </div>
            <div class="print-note" id="pn-shifts"></div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;font-size:12px">
                <span style="background:#bfdbfe;padding:3px 10px;border-radius:4px">日勤</span>
                <span style="background:#fef9c3;padding:3px 10px;border-radius:4px">午前</span>
                <span style="background:#ede9fe;padding:3px 10px;border-radius:4px">午後</span>
                <span style="background:#d1fae5;padding:3px 10px;border-radius:4px">変則</span>
                <span style="background:#fed7aa;padding:3px 10px;border-radius:4px">春夏</span>
                <span style="background:#fce7f3;padding:3px 10px;border-radius:4px">有給</span>
                <span style="background:#fbcfe8;padding:3px 10px;border-radius:4px">AM有休</span>
                <span style="background:#f9a8d4;padding:3px 10px;border-radius:4px">PM有休</span>
                <span style="background:#fda4af;padding:3px 10px;border-radius:4px">時間有給</span>
                <span style="background:#fef08a;padding:3px 10px;border-radius:4px">研修</span>
                <span style="background:#f1f5f9;padding:3px 10px;border-radius:4px">休</span>
                <small style="color:#9ca3af;padding:3px 0">（セルをクリックで変更）</small>
            </div>
            <div id="shift-tbl-monthly"></div>
        </div>

        <!-- 申請確認 -->
        <div id="tab-requests" class="hidden">
            <div class="sec-hd">
                <span class="sec-title">シフト変更申請</span>
                <button class="btn btn-ghost" onclick="loadRequests()">🔄 更新</button>
                <button class="btn btn-ghost" onclick="toggleAdminFix()">✏️ 手動打刻補正</button>
            </div>

            <!-- 管理者手動打刻補正フォーム -->
            <div id="admin-fix-form" style="display:none;background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:4px solid #f97316">
                <div style="font-size:15px;font-weight:700;margin-bottom:14px">✏️ 管理者による打刻補正（直接入力）</div>
                <div class="form-row">
                    <select id="afix-emp" style="min-width:120px"></select>
                    <input type="date" id="afix-date">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
                    <label style="font-size:13px;color:#6b7280">🟢 出勤<br>
                        <input type="time" id="afix-ci" style="width:100%;margin-top:4px;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px">
                    </label>
                    <label style="font-size:13px;color:#6b7280">☕ 休憩イン<br>
                        <input type="time" id="afix-bs" style="width:100%;margin-top:4px;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px">
                    </label>
                    <label style="font-size:13px;color:#6b7280">🔵 休憩アウト<br>
                        <input type="time" id="afix-be" style="width:100%;margin-top:4px;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px">
                    </label>
                    <label style="font-size:13px;color:#6b7280">🔴 退勤<br>
                        <input type="time" id="afix-co" style="width:100%;margin-top:4px;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px">
                    </label>
                </div>
                <button class="btn btn-primary" onclick="adminCorrect()">補正を保存</button>
                <span id="afix-msg" style="font-size:13px;margin-left:12px"></span>
            </div>

            <div id="req-list"><div class="loading">読み込み中…</div></div>
        </div>

        <!-- 職員管理 -->
        <div id="tab-employees" class="hidden">
            <div class="add-form">
                <h3>職員を追加する</h3>
                <div class="form-row">
                    <input type="text" id="new-name" placeholder="名前を入力">
                    <select id="new-team"></select>
                    <select id="new-shift">
                        <option value="日勤">日勤</option>
                        <option value="午前">午前パート</option>
                        <option value="午後">午後パート</option>
                        <option value="変則">変則パート</option>
                        <option value="春夏">春夏勤務</option>
                    </select>
                    <button class="btn btn-primary" onclick="addEmployee()">追加</button>
                </div>
                <div id="emp-msg"></div>
            </div>
            <div class="sec-hd"><span class="sec-title">職員一覧</span></div>
            <div id="emp-list-admin"></div>
        </div>

        <!-- QRコード -->
        <div id="tab-qr" class="hidden">
            <div class="sec-hd"><span class="sec-title">QRコード</span></div>
            <p style="font-size:13px;color:#6b7280;margin-bottom:16px">
                各職員のQRコードを印刷して渡してください。スマホで読み込むと打刻ページが開きます。
            </p>
            <div class="qr-grid" id="qr-grid"></div>
        </div>
    </div>
</div>

<script>
// =============================================
// 設定：sb_publishable_41dGpTLOwn_S0CuI8JxY7A_WkUuTSX9 を自分のキーに変える
const SUPABASE_URL = 'https://afqhuswlhgcqaduyppja.supabase.co'
const SUPABASE_KEY = 'sb_publishable_41dGpTLOwn_S0CuI8JxY7A_WkUuTSX9'
const ADMIN_PASSWORD = '0358'   // ← パスワードはここで変えられます
// =============================================

const { createClient } = window.supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

let employees = [], teams = [], pendingMap = {}
let weekOffset = 0, shiftMonthOffset = 0

const SHIFT_TYPES = ['日勤','午前','午後','変則','春夏','有給','AM有休','PM有休','時間有給','研修','休']
const SHIFT_COLORS = {
    '日勤':    '#bfdbfe',   // 青
    '午前':    '#fef9c3',   // 黄
    '午後':    '#ede9fe',   // 薄紫
    '変則':    '#d1fae5',   // 薄緑
    '春夏':    '#fed7aa',   // オレンジ
    '有給':    '#fce7f3',   // 薄ピンク
    'AM有休':  '#fbcfe8',   // ピンク
    'PM有休':  '#f9a8d4',   // ピンク（中）
    '時間有給':'#fda4af',   // ローズ
    '研修':    '#fef08a',   // 黄緑
    '休':      '#f1f5f9',   // グレー
}
// 各シフトの所定労働時間（時間）
const SHIFT_HOURS = {
    '日勤':8, '午前':4.5, '午後':4, '変則':7, '春夏':6.5,
    '有給':8, 'AM有休':8, 'PM有休':8, '時間有給':8, '研修':8, '休':0
}

// ---- パスワード ----
function checkPw() {
    if (document.getElementById('pw-input').value === ADMIN_PASSWORD) {
        document.getElementById('pw-screen').classList.add('hidden')
        document.getElementById('main-app').classList.remove('hidden')
        loadMaster()
        switchTab('today')
        checkPendingBadge()
    } else {
        document.getElementById('pw-err').classList.remove('hidden')
    }
}

// ---- 基本データ読み込み ----
async function loadMaster() {
    const [tr, er] = await Promise.all([
        db.from('teams').select('*').order('id'),
        db.from('employees').select('*,teams(name)').eq('active', true).order('sort_order')
    ])
    teams     = tr.data || []
    employees = er.data || []
}

// ---- タブ切り替え ----
function switchTab(name) {
    const names = ['today','records','shifts','requests','employees','qr']
    document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', names[i] === name)
    )
    names.forEach(n =>
        document.getElementById('tab-' + n).classList.toggle('hidden', n !== name)
    )
    document.querySelector('.content').style.maxWidth = (name === 'shifts') ? 'none' : ''
    if (name === 'today')     loadToday()
    if (name === 'employees') renderEmployees()
    if (name === 'qr')        renderQR()
    if (name === 'shifts')    loadShiftsMonthly()
    if (name === 'requests')  loadRequests()
}

function switchRecordTab(name) {
    ['daily','weekly','monthly'].forEach(n =>
        document.getElementById('sub-' + n).classList.toggle('hidden', n !== name)
    )
    document.querySelectorAll('.sub-tab').forEach((t, i) =>
        t.classList.toggle('active', ['daily','weekly','monthly'][i] === name)
    )
    if (name === 'weekly')  loadWeekly()
    if (name === 'monthly') initMonthly()
}

// ---- 今日の状況 ----
async function loadToday() {
    const today = new Date()
    const ds = today.toLocaleDateString('sv-SE')
    document.getElementById('today-title').textContent =
        today.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' }) + 'の出勤状況'
    document.getElementById('pn-today').textContent = '印刷日時: ' + new Date().toLocaleString('ja-JP')

    const [{ data: att }, { data: todayShifts }] = await Promise.all([
        db.from('attendance').select('*').eq('date', ds).order('timestamp'),
        db.from('shifts').select('employee_id,shift_type').eq('date', ds)
    ])

    const empAtt = {}
    for (const r of att || []) {
        if (!empAtt[r.employee_id]) empAtt[r.employee_id] = []
        empAtt[r.employee_id].push(r)
    }
    const shiftMap = {}
    for (const s of todayShifts || []) shiftMap[s.employee_id] = s.shift_type

    const LEAVE_TYPES = ['有給', 'AM有休', 'PM有休', '研修']

    let rows = '', present = 0
    for (const team of teams) {
        const te = employees.filter(e => e.team_id === team.id)
        if (!te.length) continue
        rows += `<tr class="team-row"><td colspan="6">${team.name}</td></tr>`
        for (const emp of te) {
            const recs = empAtt[emp.id] || []
            const st   = recs.length ? recs[recs.length - 1].type : null
            let badge = '<span class="badge b-none">未出勤</span>'
            if (st === 'clock_in' || st === 'break_end') { badge = '<span class="badge b-work">勤務中</span>';  present++ }
            else if (st === 'break_start')               { badge = '<span class="badge b-break">休憩中</span>'; present++ }
            else if (st === 'clock_out')                   badge = '<span class="badge b-done">退勤</span>'

            const ci = recs.find(r => r.type === 'clock_in')
            const co = [...recs].reverse().find(r => r.type === 'clock_out')
            const fmt = t => new Date(t).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'})
            const mins = calcMins(recs)

            const empShift = shiftMap[emp.id] || emp.default_shift || ''
            const biko = LEAVE_TYPES.includes(empShift)
                ? `<span style="background:#dcfce7;color:#15803d;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600">${empShift}</span>`
                : ''

            rows += `<tr>
                <td>${emp.name}</td>
                <td>${badge}</td>
                <td>${ci ? fmt(ci.timestamp) : '-'}</td>
                <td>${co ? fmt(co.timestamp) : '-'}</td>
                <td>${mins > 0 ? toHHMM(mins) : '-'}</td>
                <td>${biko}</td>
            </tr>`
        }
    }

    document.getElementById('today-tbl').innerHTML = `
        <table>
            <thead><tr><th>名前</th><th>状態</th><th>出勤</th><th>退勤</th><th>勤務時間</th><th>備考</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
        <p style="margin-top:12px;font-size:13px;color:#6b7280">
            出勤中: ${present}名 ／ 全${employees.length}名
        </p>`
}

// ---- 週間集計 ----
function getWeekDays(offset) {
    const now = new Date(), dow = now.getDay()
    const mon = new Date(now)
    mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7)
    mon.setHours(0, 0, 0, 0)
    return Array.from({length: 7}, (_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return d })
}

async function loadWeekly() {
    const days = getWeekDays(weekOffset)
    const from = days[0].toLocaleDateString('sv-SE')
    const to   = days[6].toLocaleDateString('sv-SE')
    const wkLbl = `${days[0].toLocaleDateString('ja-JP',{month:'short',day:'numeric'})} 〜 ${days[6].toLocaleDateString('ja-JP',{month:'short',day:'numeric'})}`
    document.getElementById('week-label').textContent = wkLbl
    document.getElementById('pn-weekly').textContent  = `週間集計 ${wkLbl}　印刷日時: ${new Date().toLocaleString('ja-JP')}`

    const { data: att } = await db.from('attendance').select('*').gte('date', from).lte('date', to).order('timestamp')
    const dayHdrs = days.map(d =>
        `<th style="text-align:center">${['日','月','火','水','木','金','土'][d.getDay()]}<br><small>${d.getDate()}日</small></th>`
    ).join('')

    let rows = '', totals = new Array(7).fill(0), grandTotal = 0

    for (const team of teams) {
        const te = employees.filter(e => e.team_id === team.id)
        if (!te.length) continue
        rows += `<tr class="team-row"><td colspan="9">${team.name}</td></tr>`
        for (const emp of te) {
            const ea = (att || []).filter(r => r.employee_id === emp.id)
            let weekSum = 0
            const cells = days.map((d, i) => {
                const ds   = d.toLocaleDateString('sv-SE')
                const recs = ea.filter(r => r.date === ds).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
                const m    = calcMins(recs)
                weekSum   += m; totals[i] += m
                return `<td style="text-align:center">${m > 0 ? toHHMM(m) : '-'}</td>`
            }).join('')
            grandTotal += weekSum
            rows += `<tr><td>${emp.name}</td>${cells}<td style="text-align:center;font-weight:700">${weekSum > 0 ? toHHMM(weekSum) : '-'}</td></tr>`
        }
    }

    document.getElementById('weekly-tbl').innerHTML = `
        <table>
            <thead><tr><th>名前</th>${dayHdrs}<th style="text-align:center">週合計</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>`
}

function changeWeek(d) { weekOffset += d; loadWeekly() }

function getShiftMonth() {
    const now = new Date()
    const d = new Date(now.getFullYear(), now.getMonth() + shiftMonthOffset, 1)
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`
}

async function loadShiftsMonthly() {
    const month = getShiftMonth()
    const [year, mon] = month.split('-')
    const lastDay = new Date(parseInt(year), parseInt(mon), 0).getDate()
    const from = `${month}-01`
    const to   = `${month}-${String(lastDay).padStart(2,'0')}`

    document.getElementById('shift-month-label').textContent = `${year}年${mon}月`
    document.getElementById('pn-shifts').textContent = `シフト表 ${year}年${mon}月　印刷日時: ${new Date().toLocaleString('ja-JP')}`

    const filterEl = document.getElementById('shift-team-filter')
    const prevFilter = filterEl.value
    filterEl.innerHTML = '<option value="all">全員</option>' +
        teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('')
    filterEl.value = prevFilter || 'all'
    const teamFilter = filterEl.value

    // シフト（変更済み）読み込み
    const { data: shifts } = await db.from('shifts').select('*').gte('date', from).lte('date', to)
    const overrideMap = {}
    for (const s of shifts || []) {
        if (s.shift_type) overrideMap[`${s.employee_id}_${s.date}`] = s.shift_type
    }

    // チーム別表示の場合は実績データも取得
    let attMap = {} // { empId_date: [records...] }
    if (teamFilter !== 'all') {
        const { data: attData } = await db.from('attendance')
            .select('*').gte('date', from).lte('date', to).order('timestamp')
        for (const r of attData || []) {
            const k = `${r.employee_id}_${r.date}`
            if (!attMap[k]) attMap[k] = []
            attMap[k].push(r)
        }
    }

    const displayEmps = teamFilter === 'all' ? employees :
        employees.filter(e => e.team_id === parseInt(teamFilter))

    const days = []
    for (let d = 1; d <= lastDay; d++) {
        const date = new Date(parseInt(year), parseInt(mon)-1, d)
        days.push({ d, dow: date.getDay(), ds: `${month}-${String(d).padStart(2,'0')}` })
    }

    const colCount = teamFilter === 'all' ? lastDay + 3 : lastDay + 4
    let hdr = '<th style="min-width:72px;position:sticky;left:0;background:#f8fafc;z-index:2;font-size:13px">名前</th>'
    for (const { d, dow } of days) {
        const bg = dow===0 ? '#fee2e2' : dow===6 ? '#dbeafe' : '#f8fafc'
        hdr += `<th style="background:${bg};min-width:34px;text-align:center;font-size:12px;padding:3px 2px">${d}<br>${['日','月','火','水','木','金','土'][dow]}</th>`
    }
    hdr += `<th style="background:#e0f2fe;min-width:52px;text-align:center;font-size:12px;padding:3px 4px">月合計</th>`
    hdr += `<th style="background:#f0fdf4;min-width:52px;text-align:center;font-size:12px;padding:3px 4px">週平均</th>`
    if (teamFilter !== 'all') {
        hdr += `<th style="background:#fef3c7;min-width:52px;text-align:center;font-size:12px;padding:3px 4px">残業計</th>`
    }

    const LEGEND = `【勤務時間】　1.一日勤務 9:00〜18:00　2.AM勤務 9:00〜13:30　3.時短勤務 9:00〜17:00　4.PM勤務 14:00〜18:00　5.長期休業勤務 8:30〜16:30　6.休み　7.有給（8時間勤務扱）　8.有給（4時間勤務扱）`
    const today = new Date().toLocaleDateString('sv-SE')

    let rows = ''
    for (const team of teams) {
        const te = displayEmps.filter(e => e.team_id === team.id)
        if (!te.length) continue
        if (teamFilter === 'all') {
            rows += `<tr class="team-row"><td colspan="${colCount}">${team.name}</td></tr>`
        }
        for (const emp of te) {
            const roleTag = (teamFilter !== 'all' && emp.role) ? `<br><span style="font-size:10px;font-weight:400;color:#6b7280;line-height:1.3">${emp.role}</span>` : ''
            let cells = `<td style="white-space:normal;word-break:break-all;font-weight:600;position:sticky;left:0;background:white;z-index:1;padding:5px 8px;font-size:13px;min-width:64px;max-width:80px;line-height:1.4">${emp.name}${roleTag}</td>`
            let totalHours = 0
            let totalOT = 0   // 残業合計（時間）

            for (const { dow, ds } of days) {
                const key = `${emp.id}_${ds}`
                const isWknd = dow===0 || dow===6
                const fixedOff = (emp.fixed_off_days || []).includes(dow)
                const st = overrideMap[key] !== undefined ? overrideMap[key] : (isWknd || fixedOff ? '休' : (emp.default_shift || '日勤'))
                const bg = SHIFT_COLORS[st] || '#fff'

                if (teamFilter === 'all') {
                    // 全員表示：予定シフト時間で集計
                    totalHours += SHIFT_HOURS[st] || 0
                } else {
                    // チーム別表示：実績タイムカードで集計
                    const recs = attMap[key] || []
                    const hasCO = recs.some(r => r.type === 'clock_out')
                    if (hasCO && ds <= today) {
                        // 実績あり → タイムカードから計算
                        const { regular, overtime } = calcActualDayHours(recs)
                        totalHours += regular + overtime  // 月合計＝残業込みの実働時間
                        totalOT    += overtime
                    } else {
                        // 実績なし（未来日 or 未打刻）→ 予定シフト時間
                        totalHours += SHIFT_HOURS[st] || 0
                    }
                }

                cells += `<td onclick="cycleShift('${emp.id}','${ds}','${st}')"
                    style="background:${bg};text-align:center;font-size:12px;cursor:pointer;padding:3px 2px;border:1px solid #f0f0f0">${st}</td>`
            }

            const weeklyAvg = (totalHours / (lastDay / 7)).toFixed(1)
            const totalDisp = teamFilter === 'all'
                ? `${totalHours}h`
                : `${totalHours.toFixed(1)}h`
            cells += `<td style="background:#e0f2fe;text-align:center;font-size:12px;font-weight:600;padding:3px 4px;border:1px solid #bae6fd">${totalDisp}</td>`
            cells += `<td style="background:#f0fdf4;text-align:center;font-size:12px;font-weight:600;padding:3px 4px;border:1px solid #bbf7d0">${weeklyAvg}h</td>`
            if (teamFilter !== 'all') {
                const otDisp = totalOT > 0 ? `${totalOT.toFixed(1)}h` : '-'
                cells += `<td style="background:#fef3c7;text-align:center;font-size:12px;font-weight:600;padding:3px 4px;border:1px solid #fde68a;color:${totalOT>0?'#92400e':'#9ca3af'}">${otDisp}</td>`
            }
            rows += `<tr>${cells}</tr>`
        }
        if (teamFilter !== 'all') {
            rows += `<tr><td colspan="${colCount}" style="font-size:11px;padding:6px 10px;background:#f8fafc;color:#374151;border-top:2px solid #cbd5e1;border-bottom:2px solid #cbd5e1;white-space:normal">${LEGEND}</td></tr>`
        }
    }

    document.getElementById('shift-tbl-monthly').innerHTML =
        `<div style="overflow-x:auto"><table style="border-collapse:collapse;background:white;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.07)">
        <thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`
}

// 1日の実績時間を計算（正規時間・残業時間を返す）
function calcActualDayHours(recs) {
    const sorted = [...recs].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
    const ci = sorted.find(r => r.type === 'clock_in')
    const co = [...sorted].reverse().find(r => r.type === 'clock_out')
    if (!ci || !co) return { regular: 0, overtime: 0 }
    const start = new Date(ci.timestamp)
    const end   = new Date(co.timestamp)
    // 休憩時間
    let breakMs = 0
    const bs = sorted.find(r => r.type === 'break_start')
    const be = sorted.find(r => r.type === 'break_end')
    if (bs && be) breakMs = new Date(be.timestamp) - new Date(bs.timestamp)
    const totalMin = (end - start) / 60000 - breakMs / 60000
    // 18:00以降が残業
    const base18 = new Date(end); base18.setHours(18, 0, 0, 0)
    const otMin  = end > base18 ? (end - base18) / 60000 : 0
    const regMin = Math.max(0, totalMin - otMin)
    return { regular: regMin / 60, overtime: otMin / 60 }
}

async function cycleShift(empId, date, current) {
    const next = SHIFT_TYPES[(SHIFT_TYPES.indexOf(current) + 1) % SHIFT_TYPES.length]
    const { data } = await db.from('shifts').select('id').eq('employee_id', empId).eq('date', date)
    if (data && data.length > 0) {
        await db.from('shifts').update({ shift_type: next }).eq('id', data[0].id)
    } else {
        await db.from('shifts').insert({ employee_id: empId, date, shift_type: next })
    }
    loadShiftsMonthly()
}

function changeShiftMonth(d) { shiftMonthOffset += d; loadShiftsMonthly() }

async function addEmployee() {
    const name   = document.getElementById('new-name').value.trim()
    const teamId = parseInt(document.getElementById('new-team').value)
    if (!name) return showMsg('emp-msg', '名前を入力してください', false)
    const defaultShift = document.getElementById('new-shift').value
    const { error } = await db.from('employees').insert({ name, team_id: teamId, default_shift: defaultShift })
    if (error) return showMsg('emp-msg', 'エラー: ' + error.message, false)
    document.getElementById('new-name').value = ''
    showMsg('emp-msg', name + ' を追加しました', true)
    await loadMaster()
    renderEmployees()
}

async function moveEmployee(id, dir) {
    const allEmps = [...employees].sort((a,b) => a.sort_order - b.sort_order)
    const idx = allEmps.findIndex(e => e.id === id)
    const swapIdx = idx + dir
    if (swapIdx < 0 || swapIdx >= allEmps.length) return
    const a = allEmps[idx], b = allEmps[swapIdx]
    await Promise.all([
        db.from('employees').update({ sort_order: b.sort_order }).eq('id', a.id),
        db.from('employees').update({ sort_order: a.sort_order }).eq('id', b.id)
    ])
    await loadMaster()
    renderEmployees()
}

async function deleteEmployee(id, name) {
    if (!confirm(name + ' を削除しますか？')) return
    await db.from('employees').update({ active: false }).eq('id', id)
    await loadMaster()
    renderEmployees()
}

async function editFixedOff(empId, empName) {
    const DAY_NAMES = ['日','月','火','水','木','金','土']
    const emp = employees.find(e => e.id === empId)
    const current = emp ? (emp.fixed_off_days || []) : []
    const checks = DAY_NAMES.map((n, i) =>
        `<label style="display:inline-flex;align-items:center;gap:4px;margin:4px 8px 4px 0;font-size:15px;cursor:pointer">
            <input type="checkbox" value="${i}" ${current.includes(i)?'checked':''} style="width:16px;height:16px"> ${n}曜
        </label>`
    ).join('')
    const div = document.createElement('div')
    div.innerHTML = `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center">
        <div style="background:white;border-radius:16px;padding:24px;max-width:340px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,.2)">
            <div style="font-size:16px;font-weight:700;margin-bottom:12px">🗓 ${empName}　固定休日</div>
            <div style="margin-bottom:18px">${checks}</div>
            <div style="display:flex;gap:10px">
                <button id="fixoff-ok" class="btn btn-primary" style="flex:1">保存</button>
                <button id="fixoff-cancel" class="btn btn-ghost" style="flex:1">キャンセル</button>
            </div>
        </div>
    </div>`
    document.body.appendChild(div)
    div.querySelector('#fixoff-cancel').onclick = () => document.body.removeChild(div)
    div.querySelector('#fixoff-ok').onclick = async () => {
        const selected = [...div.querySelectorAll('input[type=checkbox]:checked')].map(c => parseInt(c.value))
        const { error } = await db.from('employees').update({ fixed_off_days: selected }).eq('id', empId)
        if (error) { alert('エラー: ' + error.message); return }
        if (emp) emp.fixed_off_days = selected
        document.body.removeChild(div)
        renderEmployees()
        showMsg('emp-msg', '固定休日を更新しました ✓', true)
    }
}

async function updateDefaultShift(empId, newShift) {
    const { error } = await db.from('employees').update({ default_shift: newShift }).eq('id', empId)
    if (error) { alert('エラー: ' + error.message); return }
    const emp = employees.find(e => e.id === empId)
    if (emp) emp.default_shift = newShift
    showMsg('emp-msg', '勤務形態を「' + newShift + '」に更新しました ✓', true)
}

        const btn = document.getElementById('tab-btn-requests')
        if (btn) {
            btn.textContent = count ? `🔴 申請確認（${count}件）` : '📬 申請確認'
            btn.style.color  = count ? '#dc2626' : ''
            btn.style.fontWeight = count ? '700' : ''
        }
    } catch(e) {}
}

async function loadRequests() {
    const { data } = await db.from('shift_requests')
        .select('*, employees(name)')
        .order('created_at', { ascending: false })

    const pending = (data || []).filter(r => r.status === 'pending')
    const done    = (data || []).filter(r => r.status !== 'pending')
    pendingMap = {}
    for (const r of pending) pendingMap[r.id] = r

    let html = ''

    if (pending.length) {
        html += `<div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:12px">⏳ 未確認（${pending.length}件）</div>`
        for (const r of pending) {
            const isFix = r.requested_type === '打刻補正'
            let fixDetail = ''
            let comment = r.reason || ''
            if (isFix && r.reason) {
                try {
                    const parsed = JSON.parse(r.reason)
                    const times = parsed.times || {}
                    comment = parsed.comment || ''
                    const labels = { clock_in:'🟢出勤', break_start:'☕休憩イン', break_end:'🔵休憩アウト', clock_out:'🔴退勤' }
                    fixDetail = Object.entries(times).map(([k,v]) => `<span style="background:#fff3e0;padding:2px 8px;border-radius:4px;margin-right:4px;font-weight:600">${labels[k]} ${v}</span>`).join('')
                } catch(e) {}
            }
            const borderColor = isFix ? '#f97316' : '#f59e0b'
            const approveBtn  = isFix
                ? `<button onclick="approveFix('${r.id}')"
                      style="padding:8px 16px;background:#ffedd5;color:#c2410c;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">✓ 承認・反映</button>`
                : `<button onclick="approveRequest('${r.id}','${r.employee_id}','${r.date}','${r.requested_type}')"
                      style="padding:8px 16px;background:#dcfce7;color:#15803d;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">✓ 承認</button>`
            html += `<div style="background:white;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:4px solid ${borderColor}">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
                    <div style="flex:1">
                        <div style="font-size:16px;font-weight:600">${r.employees?.name || '-'}</div>
                        <div style="font-size:13px;color:#6b7280;margin-top:4px">${r.date}　<span style="background:${isFix?'#ffedd5':'#fde68a'};padding:2px 8px;border-radius:4px;font-weight:600">${r.requested_type}</span></div>
                        ${fixDetail ? `<div style="margin-top:8px;line-height:2">${fixDetail}</div>` : ''}
                        ${comment ? `<div style="font-size:13px;color:#374151;margin-top:6px">💬 ${comment}</div>` : ''}
                        <div style="font-size:11px;color:#9ca3af;margin-top:6px">${new Date(r.created_at).toLocaleString('ja-JP')}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
                        ${approveBtn}
                        <button onclick="rejectRequest('${r.id}')"
                            style="padding:8px 16px;background:#fee2e2;color:#b91c1c;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">✗ 却下</button>
                    </div>
                </div>
            </div>`
        }
    } else {
        html += '<div style="background:#f0fdf4;border-radius:12px;padding:20px;text-align:center;color:#15803d;font-weight:600;margin-bottom:16px">✓ 未確認の申請はありません</div>'
    }

    if (done.length) {
        html += `<div style="font-size:13px;font-weight:700;color:#6b7280;margin:20px 0 12px">確認済み（直近20件）</div>`
        for (const r of done.slice(0, 20)) {
            const col  = r.status === 'approved' ? '#15803d' : '#b91c1c'
            const lbl  = r.status === 'approved' ? '✓ 承認済' : '✗ 却下'
            html += `<div style="background:white;border-radius:10px;padding:12px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.05);opacity:0.7;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <span style="font-weight:600">${r.employees?.name || '-'}</span>
                    <span style="font-size:13px;color:#6b7280;margin-left:10px">${r.date}　${r.requested_type}${r.requested_hours > 0 ? ' ' + r.requested_hours + '時間' : ''}</span>
                    ${r.reason ? `<span style="font-size:12px;color:#9ca3af;margin-left:8px">${r.reason}</span>` : ''}
                </div>
                <span style="font-size:13px;font-weight:600;color:${col}">${lbl}</span>
            </div>`
        }
    }

    document.getElementById('req-list').innerHTML = html || '<div class="loading">申請はありません</div>'

    // タブに未確認バッジを表示
    const btn = document.getElementById('tab-btn-requests')
    btn.textContent  = pending.length ? `🔴 申請確認（${pending.length}件）` : '📬 申請確認'
    btn.style.color  = pending.length ? '#dc2626' : ''
    btn.style.fontWeight = pending.length ? '700' : ''
}

async function approveRequest(id, empId, date, type) {
    if (!confirm(`${date} の ${type} を承認してシフト表に反映しますか？`)) return
    try {
        const { data: ex } = await db.from('shifts').select('id').eq('employee_id', empId).eq('date', date)
        if (ex && ex.length > 0) {
            await db.from('shifts').update({ shift_type: type }).eq('id', ex[0].id)
        } else {
            await db.from('shifts').insert({ employee_id: empId, date, shift_type: type })
        }
        await db.from('shift_requests').update({ status: 'approved' }).eq('id', id)
        loadRequests()
    } catch(e) { alert('エラー: ' + e.message) }
}

async function rejectRequest(id) {
    if (!confirm('この申請を却下しますか？')) return
    await db.from('shift_requests').update({ status: 'rejected' }).eq('id', id)
    loadRequests()
}

async function approveFix(id) {
    const r = pendingMap[id]
    if (!r) return alert('データが見つかりません。画面を更新してください。')
    const { employee_id: empId, date } = r
    if (!confirm(`${date} の打刻補正を承認して出退勤記録に反映しますか？`)) return
    try {
        const parsed = JSON.parse(r.reason)
        const times  = parsed.times || {}
        for (const [type, time] of Object.entries(times)) {
            const timestamp = new Date(`${date}T${time}:00`).toISOString()
            const { data: ex } = await db.from('attendance')
                .select('id').eq('employee_id', empId).eq('date', date).eq('type', type)
            if (ex && ex.length > 0) {
                await db.from('attendance').update({ timestamp }).eq('id', ex[0].id)
            } else {
                await db.from('attendance').insert({ employee_id: empId, date, type, timestamp })
            }
        }
        await db.from('shift_requests').update({ status: 'approved' }).eq('id', id)
        loadRequests()
        alert('✓ 打刻補正を反映しました')
    } catch(e) { alert('エラー: ' + e.message) }
}

    const f = document.getElementById('admin-fix-form')

async function adminCorrect() {
    const empId = document.getElementById('afix-emp').value
    const date  = document.getElementById('afix-date').value
    const ci    = document.getElementById('afix-ci').value
    const bs    = document.getElementById('afix-bs').value
    const be    = document.getElementById('afix-be').value
    const co    = document.getElementById('afix-co').value
    if (!date) return
    if (!ci && !bs && !be && !co) { document.getElementById('afix-msg').textContent = '時刻を入力してください'; return }
    const times = {}
    if (ci) times.clock_in    = ci
    if (bs) times.break_start = bs
    if (be) times.break_end   = be
    if (co) times.clock_out   = co
    try {
        for (const [type, time] of Object.entries(times)) {
            const timestamp = new Date(`${date}T${time}:00`).toISOString()
            const { data: ex } = await db.from('attendance')
                .select('id').eq('employee_id', empId).eq('date', date).eq('type', type)
            if (ex && ex.length > 0) {
                await db.from('attendance').update({ timestamp }).eq('id', ex[0].id)
            } else {
                await db.from('attendance').insert({ employee_id: empId, date, type, timestamp })
            }
        }
        document.getElementById('afix-msg').textContent = '✓ 保存しました'
        document.getElementById('afix-ci').value = ''
        document.getElementById('afix-bs').value = ''
        document.getElementById('afix-be').value = ''
        document.getElementById('afix-co').value = ''
        setTimeout(() => document.getElementById('afix-msg').textContent = '', 3000)
    } catch(e) { alert('エラー: ' + e.message) }
}

// ---- 月間個人記録 ----
function initMonthly() {
    const sel = document.getElementById('monthly-emp')
    sel.innerHTML = employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('')
    const now = new Date()
    document.getElementById('monthly-month').value =
        `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`
}

async function loadMonthly() {
    const empId = document.getElementById('monthly-emp').value
    const month = document.getElementById('monthly-month').value
    if (!empId || !month) return alert('職員と月を選択してください')
    const emp = employees.find(e => e.id === empId)
    const [year, mon] = month.split('-')
    const from = `${month}-01`
    const lastDay = new Date(parseInt(year), parseInt(mon), 0).getDate()
    const to = `${month}-${String(lastDay).padStart(2,'0')}`
    document.getElementById('pn-monthly-emp').textContent =
        `${emp.name} ${year}年${mon}月　印刷日時: ${new Date().toLocaleString('ja-JP')}`
    const { data } = await db.from('attendance')
        .select('*').eq('employee_id', empId)
        .gte('date', from).lte('date', to).order('timestamp')
    const byDate = {}
    for (const r of data || []) {
        if (!byDate[r.date]) byDate[r.date] = []
        byDate[r.date].push(r)
    }
    const fmt = t => new Date(t).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})
    let rows = '', totalMins = 0, totalOt = 0
    for (let d = 1; d <= lastDay; d++) {
        const ds = `${month}-${String(d).padStart(2,'0')}`
        const dayName = ['日','月','火','水','木','金','土'][new Date(ds).getDay()]
        const recs = (byDate[ds] || []).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
        const ci = recs.find(r => r.type === 'clock_in')
        const bs = recs.find(r => r.type === 'break_start')
        const be = recs.find(r => r.type === 'break_end')
        const co = [...recs].reverse().find(r => r.type === 'clock_out')
        const mins = calcMins(recs)
        const ot = calcOvertime(recs)
        totalMins += mins
        totalOt += ot
        if (!ci && !co) continue
        const weekend = new Date(ds).getDay() === 0 || new Date(ds).getDay() === 6
        rows += `<tr ${weekend ? 'style="color:#9ca3af"' : ''}>`
        rows += `<td>${parseInt(mon)}/${d}（${dayName}）</td>`
        rows += `<td>${ci ? fmt(ci.timestamp) : '-'}</td>`
        rows += `<td>${bs ? fmt(bs.timestamp) : '-'}</td>`
        rows += `<td>${be ? fmt(be.timestamp) : '-'}</td>`
        rows += `<td>${co ? fmt(co.timestamp) : '-'}</td>`
        rows += `<td>${mins > 0 ? toHHMM(mins) : '-'}</td>`
        rows += `<td>${ot > 0 ? `<span style="color:#b91c1c;font-weight:600">${toHHMM(ot)}</span>` : '-'}</td></tr>`
    }
    if (!rows) rows = '<tr><td colspan="7" style="text-align:center;color:#9ca3af">記録がありません</td></tr>'
    rows += `<tr class="total-row"><td>月間合計</td><td>-</td><td>-</td><td>-</td><td>-</td><td>${toHHMM(totalMins)}</td><td style="color:#b91c1c">${totalOt > 0 ? toHHMM(totalOt) : '-'}</td></tr>`
    document.getElementById('monthly-tbl').innerHTML =
        `<table><thead><tr><th>日付</th><th>出勤</th><th>休憩イン</th><th>休憩アウト</th><th>退勤</th><th>勤務時間</th><th style="color:#b91c1c">残業</th></tr></thead><tbody>${rows}</tbody></table>`
}

// ---- ヘルパー ----
function calcMins(records) {
    let ci = null, bs = null, brk = 0, result = 0
    const sorted = [...records].sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp))
    for (const r of sorted) {
        const t = new Date(r.timestamp)
        if (r.type === 'clock_in')                    ci = t
        else if (r.type === 'break_start')             bs = t
        else if (r.type === 'break_end' && bs)       { brk += (t-bs)/60000; bs = null }
        else if (r.type === 'clock_out' && ci)         result = (t-ci)/60000 - brk
    }
    if (ci && result === 0) result = (new Date()-ci)/60000 - brk
    return Math.max(0, Math.round(result))
}

function toHHMM(mins) {
    return `${Math.floor(mins/60)}:${String(mins%60).padStart(2,'0')}`
}

// 18:00以降の残業時間（分）を計算
function calcOvertime(records) {
    const co = [...records].reverse().find(r => r.type === 'clock_out')
    if (!co) return 0
    const coTime = new Date(co.timestamp)
    const base = new Date(coTime)
    base.setHours(18, 0, 0, 0)
    return coTime > base ? Math.round((coTime - base) / 60000) : 0
}
